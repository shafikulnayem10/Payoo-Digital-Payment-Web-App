<!DOCTYPE html>
<html lang="en" data-theme="synthwave">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Login Page</title>
    <!-- icon -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind & daisyui cdn -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- for all themes -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

<!-- google font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<!-- external css -->
<link rel="stylesheet" href="style.css">
<!-- fontawsome icon cdn -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-32  ">
        <img src="assets/Logo-full.png" alt="" class="bg-amber-50">
    </div>
    <div class="form py-[90px] px-9">
 
 
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl pt-5">
      <div class="card-body">
         <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Mobile Number</label>
                    <input id="input-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200" value="01234567890"
                        placeholder="Enter your 11 digit Number" />

                    <br>

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="input-pin" type="password" value="1234" maxlength="4" class="input rounded-full bg-base-200"
                        placeholder="Enter 4 Digit Pin" />
                    <div></div>
                    <button id="login-btn" class="btn btn-primary mt-4 rounded-full">Login</button>
                </fieldset>
      </div>
    </div>
  
</div>

    </div>
    <script src="./scripts/logIn.js"></script>

</body>
</html>
